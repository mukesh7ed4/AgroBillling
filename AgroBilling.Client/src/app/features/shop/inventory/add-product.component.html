<div class="page-container fade-in">
  <div class="page-header">
    <div>
      <p class="breadcrumb">Home <span>/ Inventory /</span> <span>Add Product</span></p>
      <h1 class="page-title">Add Product</h1>
    </div>
    <a routerLink="/shop/inventory" class="btn btn-outline">← Back</a>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><span class="card-title">📦 Product Details</span></div>

        <div class="form-group">
          <label class="form-label">Product Name *</label>
          <input type="text" class="form-control" formControlName="productName" placeholder="e.g. DAP Fertilizer 50kg"
            [class.is-invalid]="form.get('productName')?.invalid && form.get('productName')?.touched" />
          <div class="form-error" *ngIf="form.get('productName')?.invalid && form.get('productName')?.touched">Product name is required</div>
        </div>

        <div class="form-group">
          <label class="form-label">Company / Brand Name</label>
          <input type="text" class="form-control" formControlName="companyName" placeholder="e.g. IFFCO" />
        </div>

        <div class="form-group">
          <label class="form-label">Category *</label>
          <select class="form-control" formControlName="categoryId"
            [class.is-invalid]="form.get('categoryId')?.invalid && form.get('categoryId')?.touched">
            <option value="">-- Select Category --</option>
            <option *ngFor="let c of categories" [value]="c.categoryId ?? c.id">{{ c.categoryName ?? c.name }}</option>
          </select>
          <div class="form-error" *ngIf="form.get('categoryId')?.invalid && form.get('categoryId')?.touched">Category is required</div>
        </div>

        <div class="form-group">
          <label class="form-label">Unit *</label>
          <select class="form-control" formControlName="unitId"
            [class.is-invalid]="form.get('unitId')?.invalid && form.get('unitId')?.touched">
            <option value="">-- Select Unit --</option>
            <option *ngFor="let u of units" [value]="u.unitId ?? u.id">{{ (u.unitName ?? u.name) + ' (' + (u.shortName ?? u.symbol ?? '') + ')' }}</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Primary Supplier</label>
          <select class="form-control" formControlName="supplierId">
            <option value="">-- Select Supplier (Optional) --</option>
            <option *ngFor="let s of suppliers" [value]="s.supplierId">{{ s.companyName }}</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">HSN Code</label>
          <input type="text" class="form-control" formControlName="hsnCode" placeholder="e.g. 3105" />
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">💰 Pricing & Stock</span></div>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Purchase Price (₹) *</label>
            <input type="number" class="form-control" formControlName="purchasePrice" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label class="form-label">Selling Price (₹) *</label>
            <input type="number" class="form-control" formControlName="sellingPrice" min="0" step="0.01"
              [class.is-invalid]="form.get('sellingPrice')?.invalid && form.get('sellingPrice')?.touched" />
            <div class="form-error" *ngIf="form.get('sellingPrice')?.invalid && form.get('sellingPrice')?.touched">Enter valid price</div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">GST Setting</label>
          <div class="gst-toggle">
            <label class="toggle-label">
              <input type="checkbox" formControlName="useShopGst" />
              <span>Use Shop Default GST%</span>
            </label>
          </div>
          <input *ngIf="!form.value.useShopGst" type="number" class="form-control mt-8"
            formControlName="gstPercent" min="0" max="100" placeholder="Custom GST %" />
        </div>

        <div class="divider"></div>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Opening Stock</label>
            <input type="number" class="form-control" formControlName="currentStock" min="0" step="0.001" />
          </div>
          <div class="form-group">
            <label class="form-label">Min Stock Alert</label>
            <input type="number" class="form-control" formControlName="minStockAlert" min="0" step="0.001" />
            <p class="text-xs text-muted mt-8">Alert when stock falls below this</p>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg mt-16" [disabled]="submitting">
          <span *ngIf="submitting" class="btn-spinner"></span>
          {{ submitting ? 'Saving...' : '✅ Save Product' }}
        </button>
      </div>
    </div>
  </form>
</div>
