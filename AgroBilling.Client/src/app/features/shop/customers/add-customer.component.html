<div class="page-container fade-in">
  <div class="page-header">
    <div>
      <p class="breadcrumb">Home <span>/ Customers /</span> <span>Add New</span></p>
      <h1 class="page-title">Add Customer</h1>
    </div>
    <a routerLink="/shop/customers" class="btn btn-outline">← Back</a>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><span class="card-title">👤 Personal Details</span></div>

        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input type="text" class="form-control" formControlName="fullName" placeholder="e.g. Ramesh Kumar"
            [class.is-invalid]="form.get('fullName')?.invalid && form.get('fullName')?.touched" />
          <div class="form-error" *ngIf="form.get('fullName')?.invalid && form.get('fullName')?.touched">Name is required</div>
        </div>

        <div class="form-group">
          <label class="form-label">Father's Name</label>
          <input type="text" class="form-control" formControlName="fatherName" placeholder="e.g. Suresh Kumar" />
        </div>

        <div class="form-group">
          <label class="form-label">Mobile Number *</label>
          <input type="tel" class="form-control" formControlName="mobileNumber" placeholder="10-digit mobile number"
            [class.is-invalid]="form.get('mobileNumber')?.invalid && form.get('mobileNumber')?.touched" />
          <div class="form-error" *ngIf="form.get('mobileNumber')?.invalid && form.get('mobileNumber')?.touched">Enter valid 10-digit mobile</div>
        </div>

        <div class="form-group">
          <label class="form-label">Alternate Mobile</label>
          <input type="tel" class="form-control" formControlName="alternateMobile" placeholder="Optional" />
        </div>

        <div class="form-group">
          <label class="form-label">Land (Acres)</label>
          <input type="number" class="form-control" formControlName="landAcres" placeholder="e.g. 5.5" min="0" step="0.5" />
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">📍 Address Details</span></div>

        <div class="form-group">
          <label class="form-label">Village / Locality</label>
          <input type="text" class="form-control" formControlName="village" placeholder="e.g. Rohtak" />
        </div>

        <div class="form-group">
          <label class="form-label">Tehsil</label>
          <input type="text" class="form-control" formControlName="tehsil" placeholder="e.g. Rohtak" />
        </div>

        <div class="form-group">
          <label class="form-label">District</label>
          <input type="text" class="form-control" formControlName="district" placeholder="e.g. Rohtak" />
        </div>

        <div class="form-group">
          <label class="form-label">State</label>
          <input type="text" class="form-control" formControlName="state" />
        </div>

        <div class="form-group">
          <label class="form-label">Opening Balance (₹)</label>
          <input type="number" class="form-control" formControlName="openingBalance" min="0" placeholder="Previous due if any" />
          <p class="text-xs text-muted mt-8">Enter if customer had pending amount before joining this system</p>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg mt-16" [disabled]="submitting">
          <span *ngIf="submitting" class="btn-spinner"></span>
          {{ submitting ? 'Saving...' : '✅ Save Customer' }}
        </button>
      </div>
    </div>
  </form>
</div>
