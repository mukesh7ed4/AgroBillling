<div class="page-container fade-in">
  <div class="page-header">
    <div>
      <p class="breadcrumb">Admin <span>/ Subscriptions</span></p>
      <h1 class="page-title">Subscriptions</h1>
      <p class="page-subtitle">{{ filtered.length }} shops</p>
    </div>
  </div>

  <div class="filter-tabs mb-24">
    <button class="tab-btn" [class.active]="filterStatus==='all'"      (click)="filterStatus='all'">All ({{ shops.length }})</button>
    <button class="tab-btn" [class.active]="filterStatus==='active'"   (click)="filterStatus='active'">✅ Active</button>
    <button class="tab-btn" [class.active]="filterStatus==='expiring'" (click)="filterStatus='expiring'">⚠️ Expiring Soon</button>
    <button class="tab-btn" [class.active]="filterStatus==='expired'"  (click)="filterStatus='expired'">❌ Expired</button>
  </div>

  <div class="loading-overlay" *ngIf="loading"><div class="spinner"></div></div>

  <div class="card" *ngIf="!loading">
    <div class="empty-state" *ngIf="!filtered.length">
      <div class="empty-icon">📅</div><h3>No shops in this category</h3>
    </div>
    <div class="table-wrapper" *ngIf="filtered.length">
      <table>
        <thead><tr><th>Shop</th><th>Owner</th><th>Plan</th><th>Start</th><th>End</th><th>Status</th><th>Action</th></tr></thead>
        <tbody>
          <tr *ngFor="let s of filtered">
            <td class="font-bold">{{ s.shopName }}</td>
            <td>{{ s.ownerName }}</td>
            <td><span class="badge badge-muted">{{ s.planName }}</span></td>
            <td class="text-muted">{{ s.startDate | date:'dd MMM yyyy' }}</td>
            <td>{{ s.endDate | date:'dd MMM yyyy' }}</td>
            <td><span class="badge" [class]="alertClass(s.daysLeft)">{{ alertLabel(s.daysLeft) }}</span></td>
            <td><a routerLink="/admin/shops" class="btn btn-sm btn-outline">Manage</a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
